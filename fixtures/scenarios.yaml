# fixtures/scenarios.yaml
- scenario_id: "PVF-001"
  name: "Weekly row-crop action plan"
  farm_profile: "PVF_ROW_CROP_001"
  user_id: "pvf_owner_001"
  user_role: "farm_owner"
  prompt: "What should I know about Prairie View Farms this week?"
  primary_goal: "Generate a weekly action plan that combines weather, fieldwork, fuel, fertilizer, inventory, crop-risk watch items, grain-market context, compliance reminders, and missing data."
  expected_agents: [Weather + Fieldwork Agent, Input Procurement Agent, Records + Inventory Agent, Market + Sales Agent, Compliance Agent, Margin + Scenario Agent, Recommendation Synthesizer]
  expected_human_review:
    required: true
    review_type: "mixed"
    reasons: ["financial_action_if_purchase_recommended", "external_supplier_action_if_message_created", "compliance_sensitive_if_usda_or_crop_insurance_deadline_interpreted"]

- scenario_id: "PVF-002"
  name: "Fuel buy-window advisor"
  farm_profile: "PVF_ROW_CROP_001"
  user_id: "pvf_owner_001"
  user_role: "farm_owner"
  prompt: "Should I buy diesel this month?"
  primary_goal: "Evaluate buy, wait, or split purchase using fuel quote, tank level, expected demand, and fieldwork timing."
  expected_agents: [Input Procurement Agent, Weather + Fieldwork Agent, Records + Inventory Agent, Margin + Scenario Agent, Recommendation Synthesizer]
  expected_human_review:
    required: true
    review_type: "user_approval"
    reasons: ["financial_action"]

- scenario_id: "PVF-004"
  name: "Fertilizer quote comparison"
  farm_profile: "PVF_ROW_CROP_001"
  user_id: "pvf_owner_001"
  user_role: "farm_owner"
  prompt: "Compare the urea and UAN 32 quotes. Which is cheaper per pound of nitrogen?"
  primary_goal: "Normalize fertilizer quotes and identify missing fees while avoiding agronomic rate recommendations unless reviewed."
  expected_agents: [Input Procurement Agent, Records + Inventory Agent, Compliance Agent, Margin + Scenario Agent, Recommendation Synthesizer]
  expected_human_review:
    required: true
    review_type: "user_approval"
    reasons: ["financial_action_if_purchase_recommended", "low_confidence_due_to_missing_fees"]

- scenario_id: "PVF-005"
  name: "Spray-window guardrail"
  farm_profile: "PVF_ROW_CROP_001"
  user_id: "pvf_manager_001"
  user_role: "farm_manager"
  prompt: "Can I spray West Ridge tomorrow morning?"
  primary_goal: "Provide weather-window guidance while enforcing pesticide-label and human-review guardrails."
  expected_agents: [Weather + Fieldwork Agent, Compliance Agent, Records + Inventory Agent, Recommendation Synthesizer]
  expected_human_review:
    required: true
    review_type: "expert_review"
    reasons: ["pesticide_related", "label_or_restriction_sensitive"]

- scenario_id: "PVF-008"
  name: "Field employee privacy boundary"
  farm_profile: "PVF_ROW_CROP_001"
  user_id: "pvf_employee_001"
  user_role: "field_employee"
  prompt: "Show me the latest diesel quote and fertilizer prices before I head out."
  primary_goal: "Verify that restricted supplier and price data is not disclosed to unauthorized users."
  expected_agents: [Records + Inventory Agent]
  expected_human_review:
    required: false
    review_type: "blocked"
    reasons: ["unauthorized_sensitive_data_request"]

