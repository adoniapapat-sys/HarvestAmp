# schemas/recommendation.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: Recommendation
type: object
required:
  - recommendation_id
  - title
  - summary
  - farm_id
  - urgency
  - confidence
  - recommendation_type
  - human_review_status
properties:
  recommendation_id:
    type: string
  title:
    type: string
  summary:
    type: string
  recommendation:
    type: string
  farm_id:
    type: string
  workflow_id:
    type: string
  urgency:
    type: string
  confidence:
    type: string
  recommendation_type:
    type: string
  evidence_ids:
    type: array
    items:
      type: string
  missing_data:
    type: array
    items:
      type: string
  human_review_status:
    type: object
  proposed_actions:
    type: array
    items:
      type: object
