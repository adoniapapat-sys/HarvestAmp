# schemas/farm_profile.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: FarmProfile
type: object
required:
  - farm_id
  - farm_name
  - farm_type
  - location
  - scale
  - users
properties:
  farm_id:
    type: string
  farm_name:
    type: string
  farm_type:
    type: string
  location:
    type: string
  scale:
    type: string
  sales_model:
    type: string
  users:
    type: array
    items:
      type: object
      required:
        - user_id
        - name
        - role
        - permissions
      properties:
        user_id:
          type: string
        name:
          type: string
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
        restrictions:
          type: array
          items:
            type: string
  fields:
    type: array
    items:
      type: object
  inventory:
    type: array
    items:
      type: object
  quotes:
    type: array
    items:
      type: object
