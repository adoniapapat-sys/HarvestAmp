# schemas/farm_profile.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: FarmProfile
type: object
required:
  - farm_id
  - farm_name
  - farm_type
  - location
  - scale
  - users
properties:
  farm_id:
    type: string
  farm_name:
    type: string
  farm_type:
    type: string
  location:
    type: string
  scale:
    type: string
  sales_model:
    type: string
  users:
    type: array
    items:
      type: object
      required:
        - user_id
        - name
        - role
        - permissions
      properties:
        user_id:
          type: string
        name:
          type: string
        role:
          type: string
        permissions:
          type: array
          items:
            type: string
        restrictions:
          type: array
          items:
            type: string
  fields:
    type: array
    items:
      type: object
  inventory:
    type: array
    items:
      type: object
      required:
        - item_id
        - item_type
        - quantity
        - unit
        - last_updated
      properties:
        item_id: { type: string }
        item_type: { type: string }
        product_name: { type: string }
        quantity: { type: number }
        unit: { type: string }
        last_updated: { type: string }
        data_quality: { type: string }
        reorder_threshold: { type: number }
        storage_location: { type: string }
        restricted_visibility:
          type: array
          items:
            type: string
        label_on_file: { type: boolean }
        sds_on_file: { type: boolean }
        organic_documentation_on_file: { type: boolean }
        rei_phi_record_required: { type: boolean }
        licensed_applicator_required: { type: boolean }
        restricted_use_flag: { type: boolean }
        compatible_equipment: { type: string }
        maintenance_criticality: { type: string }
        compatible_workflow: { type: string }
        food_safety_relevant: { type: boolean }


  quotes:
    type: array
    items:
      type: object

