# schemas/source_metadata.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: SourceMetadata
type: object
required:
  - source_id
  - source_name
  - trust_tier
  - freshness_status
  - privacy_class
properties:
  source_id:
    type: string
  source_name:
    type: string
  source_type:
    type: string
  trust_tier:
    type: string
  freshness_status:
    type: string
  privacy_class:
    type: string
  description:
    type: string
  limitations:
    type: object
    properties:
      sensitivity: { type: string }
      public_regional_context_only: { type: boolean }
      not_a_field_diagnosis: { type: boolean }
      not_a_pesticide_recommendation: { type: boolean }
      does_not_override_farm_records: { type: boolean }
      does_not_override_scouting_notes: { type: boolean }
      does_not_override_advisor_notes: { type: boolean }
      does_not_override_pesticide_labels_or_legal: { type: boolean }
      does_not_override_organic_certification: { type: boolean }
