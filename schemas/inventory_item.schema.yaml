# schemas/inventory_item.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: InventoryItem
type: object
required:
  - item_id
  - item_type
  - quantity
  - unit
  - last_updated
properties:
  item_id:
    type: string
  item_type:
    type: string
  product_name:
    type: string
  quantity:
    type: number
  unit:
    type: string
  last_updated:
    type: string
  data_quality:
    type: string
  reorder_threshold:
    type: number
  storage_location:
    type: string
  restricted_visibility:
    type: array
    items:
      type: string
  label_on_file:
    type: boolean
  sds_on_file:
    type: boolean
  organic_documentation_on_file:
    type: boolean
  rei_phi_record_required:
    type: boolean
  licensed_applicator_required:
    type: boolean
  restricted_use_flag:
    type: boolean


