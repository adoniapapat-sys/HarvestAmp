# schemas/inventory_item.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: InventoryItem
type: object
required:
  - item_id
  - item_type
  - quantity
  - unit
  - last_updated
properties:
  item_id:
    type: string
  item_type:
    type: string
  product_name:
    type: string
  quantity:
    type: number
  unit:
    type: string
  last_updated:
    type: string
  data_quality:
    type: string
  reorder_threshold:
    type: number
  storage_location:
    type: string
  restricted_visibility:
    type: array
    items:
      type: string

