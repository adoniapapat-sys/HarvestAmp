# schemas/human_review.schema.yaml
$schema: "http://json-schema.org/draft-07/schema#"
title: HumanReview
type: object
required:
  - required
  - review_type
  - risk_tier
  - status
  - reason
properties:
  required:
    type: boolean
  review_type:
    type: string
  risk_tier:
    type: string
  status:
    type: string
  reason:
    type: array
    items:
      type: string
  recommended_reviewer:
    type: array
    items:
      type: string
  approval_required_before:
    type: array
    items:
      type: string
  confidence:
    type: string
  missing_data:
    type: array
    items:
      type: string
  disclosure_preview_required:
    type: boolean
  applies_to_action_id:
    type: string
  expires_at:
    type: string
  recheck_required_if_payload_changes:
    type: boolean
