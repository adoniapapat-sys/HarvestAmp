# configs/human_review_rules.yaml
# HarvestAmp machine-readable human-review policy scaffold.
# Planning scaffold only. Not legal, agronomic, veterinary, financial, insurance,
# tax, pesticide-label, organic-certification, food-safety, or compliance advice.

policy_version: "harvestamp_human_review_v0_2"
product_name: "HarvestAmp"
status: "planning_scaffold"
last_updated: "2026-06-23"
source_documents:
  - "06_RISK_AND_HUMAN_REVIEW_POLICY.md"
  - "05_AGENT_CONTRACTS.md"
  - "02_AGENT_ARCHITECTURE.md"
  - "03_FARM_PROFILES.md"
  - "04_DATA_SOURCES.md"
  - "08_EVALUATION_TESTS.md"
  - "09_MVP_SCOPE.md"
  - "DECISION_LOG.md"

# -----------------------------------------------------------------------------
# Global defaults
# -----------------------------------------------------------------------------

defaults:
  external_send_requires_approval: true
  purchase_commitment_requires_approval: true
  official_record_update_requires_approval: true
  destructive_record_change_requires_admin_review: true
  external_disclosure_requires_preview: true
  raw_credentials_blocked: true
  cross_tenant_disclosure_blocked: true
  cross_farm_private_data_blocked: true
  execute_trades_blocked: true
  government_form_submission_blocked_in_mvp: true
  automatic_pesticide_rate_advice_blocked: true
  automatic_organic_approval_blocked: true
  real_external_messages_blocked_in_local_mvp: true
  use_synthetic_data_by_default: true
  require_source_metadata_for_agent_findings: true
  require_human_review_for_high_impact_low_confidence: true

# -----------------------------------------------------------------------------
# Enumerations
# -----------------------------------------------------------------------------

review_types:
  none:
    description: "No explicit approval required beyond normal display to an authorized user."
  soft_confirmation:
    description: "Low-risk internal action may be confirmed or edited by user."
  user_approval:
    description: "Authorized farm user must approve before action."
  expert_review:
    description: "Qualified or responsible reviewer must confirm before relying on or executing."
  admin_review:
    description: "Farm owner or account admin must approve access, credential, export, deletion, or permission change."
  blocked:
    description: "HarvestAmp must refuse, prevent, or route outside the system."

approval_states:
  - draft
  - review_not_required
  - needs_soft_confirmation
  - needs_user_approval
  - needs_expert_review
  - needs_admin_review
  - blocked
  - approved
  - approved_with_edits
  - rejected
  - expired
  - revoked
  - executed
  - logged

risk_tiers:
  tier_0:
    label: "informational"
    review_type: "none"
    default_status: "review_not_required"
    can_execute_external_action: false
    examples:
      - "weather_summary"
      - "public_market_summary"
      - "authorized_dashboard_display"
  tier_1:
    label: "draft_or_internal_assist"
    review_type: "soft_confirmation"
    default_status: "needs_soft_confirmation"
    can_execute_external_action: false
    examples:
      - "draft_internal_task_list"
      - "draft_scouting_checklist"
      - "draft_watchlist_item"
  tier_2:
    label: "user_approval_required"
    review_type: "user_approval"
    default_status: "needs_user_approval"
    can_execute_external_action: true
    approval_required: true
    examples:
      - "supplier_message"
      - "purchase_recommendation"
      - "customer_message"
      - "inventory_update_from_invoice"
  tier_3:
    label: "expert_or_responsible_human_review_required"
    review_type: "expert_review"
    default_status: "needs_expert_review"
    can_execute_external_action: true
    approval_required: true
    examples:
      - "pesticide_related_guidance"
      - "organic_input_uncertainty"
      - "crop_insurance_interpretation"
      - "food_safety_risk"
  tier_4:
    label: "blocked_or_admin_restricted"
    review_type: "blocked"
    default_status: "blocked"
    can_execute_external_action: false
    examples:
      - "raw_credential_exposure"
      - "cross_farm_private_data_disclosure"
      - "commodity_trade_execution"
      - "automatic_government_filing"

confidence_values:
  high: "Relevant data is current, specific, consistent, and sufficient for the limited recommendation."
  medium: "Data is useful but includes some uncertainty, missing details, or forecast dependency."
  low: "Required data is missing, stale, conflicting, incomplete, or high risk."
  insufficient_data: "Not enough information to provide the requested recommendation safely."

# -----------------------------------------------------------------------------
# Canonical human_review object requirements
# -----------------------------------------------------------------------------

human_review_required_fields:
  - required
  - review_type
  - risk_tier
  - status
  - reason
  - recommended_reviewer
  - approval_required_before
  - confidence
  - missing_data
  - disclosure_preview_required

approval_scope_required_fields:
  - applies_to_action_id
  - expires_at
  - recheck_required_if_payload_changes

allowed_action_execution_statuses:
  - review_not_required
  - approved
  - approved_with_edits

# External actions still require review even if a tier_0 display action is review_not_required.
external_execution_allowed_only_when:
  - "user_authenticated"
  - "user_authorized_for_farm"
  - "tool_gateway_authorized"
  - "human_review_status_is_approved_or_approved_with_edits"
  - "approval_applies_to_exact_payload"
  - "approval_not_expired"
  - "disclosure_preview_shown_if_external_disclosure"
  - "audit_event_created"

# -----------------------------------------------------------------------------
# Universal trigger rules
# -----------------------------------------------------------------------------

universal_triggers:
  financial_action:
    minimum_tier: "tier_2"
    review_type: "user_approval"
    reason: "financial_action"
    required_reviewer:
      - farm_owner
      - farm_manager
      - authorized_purchasing_user
    approval_required_before:
      - send_message
      - create_purchase_order
      - commit_to_delivery
      - create_sale_commitment

  external_disclosure:
    minimum_tier: "tier_2"
    review_type: "user_approval"
    reason: "external_disclosure"
    disclosure_preview_required: true
    approval_required_before:
      - send_message
      - share_report
      - publish_customer_message
      - export_data
      - execute_external_tool

  regulated_or_compliance_sensitive:
    minimum_tier: "tier_3"
    review_type: "expert_review"
    reason: "compliance_sensitive"
    approval_required_before:
      - update_official_record
      - submit_form
      - apply_to_field_plan
      - share_with_regulator_or_certifier

  permission_or_credential_change:
    minimum_tier: "tier_4"
    review_type: "admin_review"
    reason: "permission_or_credential_change"
    approval_required_before:
      - grant_access
      - revoke_access
      - connect_data_source
      - disconnect_data_source
      - change_role
      - export_sensitive_data

  raw_credential_exposure:
    minimum_tier: "tier_4"
    review_type: "blocked"
    status: "blocked"
    reason: "credential_exposure"
    blocked_actions:
      - store_credential_in_prompt
      - store_credential_in_memory
      - echo_credential
      - use_pasted_password

  cross_farm_or_cross_tenant_private_data:
    minimum_tier: "tier_4"
    review_type: "blocked"
    status: "blocked"
    reason: "cross_farm_or_cross_tenant_disclosure"
    blocked_actions:
      - reveal_other_farm_quote
      - reveal_other_farm_margin
      - reveal_other_farm_customer_data
      - use_other_farm_private_data_as_recommendation

  stale_or_missing_high_impact_data:
    minimum_tier: "tier_2"
    review_type: "user_approval"
    reason:
      - "stale_data"
      - "missing_required_data"
    confidence_override: "low"

# -----------------------------------------------------------------------------
# Domain-specific rules
# -----------------------------------------------------------------------------

domain_rules:
  weather_fieldwork:
    default_tier: "tier_0"
    escalates_to_tier_2_when:
      - schedule_crew_instruction
      - update_official_work_plan
      - send_operational_instruction
    escalates_to_tier_3_when:
      - pesticide_related
      - severe_weather_safety_risk
      - livestock_heat_or_cold_stress
      - food_safety_risk
    required_phrasing:
      - "forecast-based decision support"
      - "confirm field conditions"

  fuel_and_energy_procurement:
    default_tier: "tier_2"
    review_type: "user_approval"
    reasons:
      - financial_action
      - external_supplier_action
    required_reviewer:
      - farm_owner
      - farm_manager
      - authorized_purchasing_user
    must_not:
      - guarantee_future_fuel_price
      - claim_exact_cheapest_day
      - contact_supplier_without_approval
      - disclose_tank_level_externally_without_approval

  fertilizer_soil_amendments_compost_manure:
    default_tier: "tier_2"
    review_type: "user_approval"
    escalates_to_tier_3_when:
      - nutrient_rate_recommendation
      - soil_test_interpretation
      - manure_or_compost_regulatory_question
      - environmental_restriction
      - organic_context
    must_distinguish:
      - arithmetic_quote_comparison
      - agronomic_recommendation
    must_not:
      - recommend_application_rate_without_review
      - ignore_missing_delivery_or_application_fees

  seed_transplants_nursery_stock:
    default_tier: "tier_2"
    review_type: "user_approval"
    escalates_to_tier_3_when:
      - organic_seed_substitution
      - seed_treatment_affects_organic_status
      - trait_or_stewardship_rule
      - major_production_plan_change

  crop_protection_pesticides_labels_spray:
    default_tier: "tier_3"
    review_type: "expert_review"
    reasons:
      - pesticide_related
      - compliance_sensitive
    required_reviewer:
      - licensed_applicator
      - agronomist
      - crop_advisor
      - farm_owner
      - farm_manager
    blocked_final_claims:
      - definitive_product_choice
      - definitive_application_rate
      - definitive_tank_mix
      - guaranteed_label_compliance
      - guaranteed_legal_application
    approval_required_before:
      - schedule_crew_instruction
      - apply_to_field_plan
      - update_official_spray_record
    required_caveats:
      - product_label
      - local_restrictions
      - field_conditions
      - crop_stage
      - drift_risk
      - applicator_judgment

  crop_scouting_disease_pest_photo_triage:
    default_tier: "tier_1"
    review_type: "soft_confirmation"
    escalates_to_tier_3_when:
      - treatment_recommendation
      - pesticide_use
      - definitive_diagnosis_requested
      - high_value_crop_or_large_acreage
    must_not:
      - diagnose_with_certainty_from_image_alone
      - recommend_treatment_as_final_instruction

  livestock_animal_health:
    default_tier: "tier_3"
    review_type: "expert_review"
    required_reviewer:
      - veterinarian
      - farm_owner
      - farm_manager
    blocked_final_claims:
      - definitive_diagnosis
      - medication_dosage
      - withdrawal_time_instruction
      - treatment_plan_as_final_advice

  commodity_livestock_market_sales:
    default_tier: "tier_2"
    review_type: "user_approval"
    escalates_to_tier_3_when:
      - hedging
      - futures
      - options
      - forward_contract_complexity
      - lender_or_crop_insurance_implication
    blocked_actions:
      - execute_trade
      - create_binding_sale_commitment_without_approval
    required_phrasing:
      - "scenario comparison"
      - "not a directive to sell, hedge, or trade"

  direct_market_csa_restaurant_farm_stand_market:
    default_tier: "tier_1"
    review_type: "soft_confirmation"
    escalates_to_tier_2_when:
      - send_customer_message
      - publish_availability_list
      - send_restaurant_availability
      - change_csa_box_customer_facing
      - place_packaging_order
    escalates_to_tier_3_when:
      - food_safety_concern
      - organic_claim
      - customer_health_or_allergen_issue

  organic_certification_and_inputs:
    default_tier: "tier_3"
    review_type: "expert_review"
    reasons:
      - organic_certification_sensitive
      - compliance_sensitive
    required_reviewer:
      - organic_certifier
      - farm_owner
    approval_required_before:
      - create_purchase_order
      - apply_to_field_plan
      - update_official_record
      - share_with_certifier
    allowed_only_when_verified:
      - final_organic_approval_claim
    verification_sources:
      - farm_specific_certifier_approved_input_list
      - certifier_correspondence
      - verified_approved_input_record
    must_not:
      - declare_product_organic_approved_without_verified_source
      - submit_certifier_packet_without_owner_approval

  usda_crop_insurance_government_programs:
    default_tier: "tier_3"
    review_type: "expert_review"
    required_reviewer:
      - crop_insurance_agent
      - usda_fsa_representative
      - farm_owner
      - farm_manager
    mvp_blocked_actions:
      - automatic_government_form_submission
      - automatic_insurance_claim_submission
    allowed_outputs:
      - reminders
      - checklists
      - document_organization
      - draft_questions

  food_safety_post_harvest:
    default_tier: "tier_3"
    review_type: "expert_review"
    required_reviewer:
      - food_safety_professional
      - farm_owner
      - farm_manager
    escalates_when:
      - contamination_risk
      - recall_risk
      - customer_illness_report
      - water_test_interpretation
      - official_food_safety_plan_change

  legal_tax_payroll_lease_contract:
    default_tier: "tier_3"
    review_type: "expert_review"
    required_reviewer:
      - attorney
      - accountant
      - farm_owner
      - account_admin
    blocked_final_claims:
      - final_legal_advice
      - final_tax_advice
      - binding_contract_interpretation
      - payroll_compliance_determination

  data_privacy_supplier_confidentiality_disclosure:
    default_tier: "tier_2"
    review_type: "user_approval"
    disclosure_preview_required: true
    blocked_without_explicit_approval:
      - supplier_quote_to_competing_supplier
      - break_even_to_supplier
      - margin_scenario_to_supplier
      - tank_level_to_supplier
      - customer_list_export
      - certification_record_share
      - crop_insurance_document_share
      - field_boundary_export
      - marketing_plan_disclosure

# -----------------------------------------------------------------------------
# Action rules
# -----------------------------------------------------------------------------

action_rules:
  display_authorized_information:
    default_tier: "tier_0"
    review_type: "none"
    can_execute_if_authorized: true

  create_internal_draft_task:
    default_tier: "tier_1"
    review_type: "soft_confirmation"
    can_execute_if_authorized: true
    becomes_tier_2_when:
      - assigned_to_crew
      - changes_official_work_plan
      - includes_restricted_data

  send_supplier_message:
    default_tier: "tier_2"
    review_type: "user_approval"
    disclosure_preview_required: true
    approval_required_before:
      - send_message
    must_not_include_unless_explicitly_approved:
      - competitor_quote
      - break_even
      - margin
      - full_inventory
      - yield_estimate
      - other_supplier_names

  create_purchase_order:
    default_tier: "tier_2"
    review_type: "user_approval"
    approval_required_before:
      - create_purchase_order
    owner_review_required_when_over_threshold: true

  send_customer_message:
    default_tier: "tier_2"
    review_type: "user_approval"
    disclosure_preview_required: true
    approval_required_before:
      - publish_customer_message
      - send_customer_message

  send_restaurant_availability:
    default_tier: "tier_2"
    review_type: "user_approval"
    disclosure_preview_required: true

  share_report_externally:
    default_tier: "tier_2"
    review_type: "user_approval"
    disclosure_preview_required: true
    escalates_to_tier_4_when:
      - recipient_not_authorized
      - contains_cross_farm_private_data

  update_inventory_from_invoice:
    default_tier: "tier_2"
    review_type: "user_approval"
    approval_required_before:
      - update_official_record
    requires_extraction_confidence_or_user_confirmation: true

  update_official_compliance_record:
    default_tier: "tier_3"
    review_type: "expert_review"
    approval_required_before:
      - update_official_record

  delete_record:
    default_tier: "tier_4"
    review_type: "admin_review"
    approval_required_before:
      - delete_record
    require_confirmation: true

  grant_or_revoke_access:
    default_tier: "tier_4"
    review_type: "admin_review"
    approval_required_before:
      - grant_access
      - revoke_access

  connect_or_disconnect_data_source:
    default_tier: "tier_4"
    review_type: "admin_review"
    approval_required_before:
      - connect_data_source
      - disconnect_data_source
    raw_credentials_in_chat: "blocked"

  execute_commodity_trade:
    default_tier: "tier_4"
    review_type: "blocked"
    status: "blocked"

  submit_government_or_insurance_form:
    default_tier: "tier_4"
    review_type: "blocked"
    status: "blocked_in_mvp"

# -----------------------------------------------------------------------------
# Role rules
# -----------------------------------------------------------------------------

role_rules:
  farm_owner:
    may_view:
      - public
      - farm_internal
      - farm_confidential
      - farm_restricted
    may_approve:
      - purchases
      - external_messages
      - official_records
      - sensitive_exports
      - user_access_changes
    notes: "Still subject to expert review for regulated domains."

  farm_manager:
    may_view:
      - public
      - farm_internal
      - farm_confidential
      - farm_restricted_when_granted
    may_approve:
      - operational_tasks
      - purchases_within_threshold
      - supplier_messages_when_granted
    cannot_approve:
      - admin_access_changes_unless_granted
      - high_value_owner_threshold_items

  authorized_purchasing_user:
    may_view:
      - public
      - farm_internal
      - farm_confidential_limited
      - supplier_quotes_when_granted
    may_approve:
      - purchases_within_threshold
      - supplier_messages_when_granted
    cannot_approve:
      - compliance_sensitive_actions
      - admin_access_changes

  field_employee:
    may_view:
      - assigned_tasks
      - non_sensitive_field_notes
      - public
      - farm_internal_limited
    cannot_view:
      - supplier_quotes
      - margins
      - break_even
      - full_inventory_when_restricted
      - customer_lists
      - compliance_documents
    cannot_approve:
      - purchases
      - external_messages
      - official_record_updates

  field_lead:
    may_view:
      - assigned_tasks
      - harvest_counts
      - packaging_counts_when_granted
      - public
      - farm_internal_limited
    cannot_view:
      - full_financials
      - certification_documents
      - customer_contact_details
    cannot_approve:
      - external_messages
      - certification_records
      - purchases_unless_explicitly_granted

  market_staff:
    may_view:
      - market_pack_list
      - market_sales_notes_limited
      - public
      - farm_internal_limited
    cannot_view:
      - supplier_quotes
      - certification_documents
      - customer_personal_data_unless_needed_and_granted
      - payment_data
    cannot_approve:
      - purchases
      - customer_messages_unless_granted

  authorized_advisor:
    may_view:
      - shared_farm_data_only
      - selected_fields_or_records_when_granted
    cannot_view_by_default:
      - supplier_quotes
      - margins
      - grain_marketing_plan
      - customer_lists
    may_review:
      - domain_specific_items_within_expertise

  external_reviewer:
    may_view:
      - explicitly_shared_packet_only
    cannot_view_by_default:
      - all_farm_data
      - customer_lists
      - supplier_quotes
      - financials
    may_review:
      - specified_item_only

  account_admin:
    may_approve:
      - access_changes
      - credential_changes
      - exports
      - retention_changes
      - destructive_record_changes
    content_access_default: "least_privilege_by_policy"

# -----------------------------------------------------------------------------
# Farm-specific defaults from MVP profiles
# -----------------------------------------------------------------------------

farm_profile_defaults:
  PVF_ROW_CROP_001:
    farm_name: "Prairie View Farms"
    purchase_approval:
      required_for_all_external_purchases: true
      manager_soft_threshold_usd: 10000
      owner_required_threshold_usd: 25000
    supplier_messages:
      approval_required_before_send: true
      quote_disclosure_requires_explicit_approval: true
    pesticide_related:
      minimum_tier: "tier_3"
      review_type: "expert_review"
    market_sales:
      user_approval_required_for:
        - buyer_message
        - sale_recommendation
        - contract_change
        - hedging_or_futures_discussion
    records:
      approval_required_for:
        - official_record_update
        - crop_insurance_document_changes
        - acreage_report_submission

  GBO_DIRECT_001:
    farm_name: "Green Basket Organics"
    purchase_approval:
      required_for_all_external_purchases: true
      owner_soft_threshold_usd: 500
      owner_required_threshold_usd: 1500
    customer_messages:
      approval_required_before_send: true
      applies_to:
        - CSA_newsletters
        - restaurant_availability_lists
        - market_posts
        - farm_stand_updates
    organic_related:
      minimum_tier: "tier_3"
      review_type: "expert_review"
      expert_review_required_for:
        - input_approval_uncertain
        - seed_substitution_documentation
        - compost_or_manure_timing
        - certifier_packet_submission
        - organic_system_plan_changes
    food_safety_related:
      minimum_tier: "tier_3"
      review_type: "expert_review"
    records:
      approval_required_for:
        - official_certification_record_update
        - customer_data_export
        - certifier_share
        - invoice_deletion

# -----------------------------------------------------------------------------
# Disclosure preview
# -----------------------------------------------------------------------------

disclosure_preview:
  required_for:
    - send_supplier_message
    - send_customer_message
    - send_restaurant_availability
    - share_report_externally
    - publish_market_post
    - share_with_certifier
    - share_with_advisor
    - export_data
  required_fields:
    - action_id
    - recipient
    - channel
    - purpose
    - included_data_categories
    - included_sensitive_items
    - includes_competing_supplier_quote
    - attachments_included
    - human_review_reason
    - approver_role_required
  recalculate_if_payload_changes: true
  must_show_not_included_when_relevant:
    - competitor_quotes
    - break_even
    - margin_scenarios
    - full_inventory
    - customer_personal_data
    - field_boundaries
    - crop_insurance_documents

# -----------------------------------------------------------------------------
# Action gate pseudologic as rules
# -----------------------------------------------------------------------------

action_gate:
  deny_when:
    - condition: "human_review.review_type == blocked"
      result_status: "blocked"
    - condition: "action_contains_raw_credentials == true"
      result_status: "blocked"
    - condition: "cross_farm_private_data_detected == true"
      result_status: "blocked"
    - condition: "user_authorized_for_farm == false"
      result_status: "blocked"
    - condition: "tool_allowlisted == false"
      result_status: "blocked"
    - condition: "approval_missing_for_required_review == true"
      result_status: "needs_approval"
    - condition: "approval_payload_mismatch == true"
      result_status: "needs_reapproval"
    - condition: "approval_expired == true"
      result_status: "expired"
    - condition: "external_disclosure_without_preview == true"
      result_status: "needs_disclosure_preview"
  allow_execute_when_all_true:
    - user_authenticated
    - user_authorized_for_farm
    - action_allowed_by_policy
    - tool_gateway_authorized
    - no_raw_credentials_present
    - no_cross_farm_private_data
    - human_review_state_allows_execution
    - approval_scope_valid_for_exact_payload
    - disclosure_preview_complete_if_required
    - audit_event_created

# -----------------------------------------------------------------------------
# Source freshness and evidence rules
# -----------------------------------------------------------------------------

evidence_rules:
  medium_or_high_risk_recommendations_require:
    - source_name
    - source_type
    - source_timestamp_or_freshness
    - source_trust_tier
    - privacy_class
    - assumptions
    - missing_data
    - confidence
    - human_review
  stale_critical_data_behavior:
    confidence_override: "low"
    required_action:
      - state_staleness
      - request_update_or_confirmation
      - avoid_final_recommendation_if_high_impact
  conflicting_sources_behavior:
    confidence_override: "low"
    required_action:
      - show_conflict
      - show_timestamps
      - ask_for_confirmation
      - trigger_review_if_high_impact

source_trust_preference_order:
  - user_confirmed_farm_record
  - current_uploaded_or_manual_supplier_quote
  - authorized_supplier_integration
  - current_public_api_or_official_source
  - recent_market_benchmark
  - historical_farm_record
  - regional_benchmark
  - public_educational_content
  - model_inference
  - assumption

# -----------------------------------------------------------------------------
# MVP-specific blocked requests and safe alternatives
# -----------------------------------------------------------------------------

blocked_request_rules:
  reveal_another_farms_private_data:
    status: "blocked"
    safe_alternatives:
      - "show_user_authorized_farm_data"
      - "use_public_benchmark"
      - "request_authorized_aggregate_workflow"
  use_pasted_password_or_api_key:
    status: "blocked"
    safe_alternatives:
      - "open_secure_connection_flow"
      - "explain_permissions"
  execute_purchase_without_approval:
    status: "needs_user_approval"
    safe_alternatives:
      - "create_draft_purchase_recommendation"
      - "show_disclosure_preview"
  exact_pesticide_rate_final_instruction:
    status: "needs_expert_review"
    safe_alternatives:
      - "weather_window_summary"
      - "label_review_checklist"
      - "draft_question_for_agronomist_or_applicator"
  final_organic_approval_without_verified_source:
    status: "needs_expert_review"
    safe_alternatives:
      - "draft_certifier_question"
      - "list_missing_input_documents"
  execute_trade_or_hedge:
    status: "blocked"
    safe_alternatives:
      - "scenario_comparison"
      - "questions_for_grain_marketer"
  submit_government_or_insurance_form:
    status: "blocked_in_mvp"
    safe_alternatives:
      - "deadline_reminder"
      - "document_checklist"
      - draft_question_for_agent_or_usda_office()

# -----------------------------------------------------------------------------
# Irrigation and Water Scheduling rules
# -----------------------------------------------------------------------------

irrigation_water_request:
  review_type: user_approval
  risk_tier: tier_2
  reasons:
    - external_action
    - resource_allocation
    - field_operation
  approval_required_before:
    - submit_irrigation_request
    - send_message
    - execute_external_tool

irrigation_schedule_change:
  review_type: user_approval
  risk_tier: tier_2
  reasons:
    - external_action
    - field_operation
    - operational_schedule_change
  approval_required_before:
    - change_irrigation_schedule
    - submit_irrigation_request

irrigation_portal_credentials:
  review_type: blocked
  risk_tier: tier_4
  reasons:
    - credential_or_secret_handling
  blocked_behaviors:
    - request_password_in_chat
    - store_portal_credentials_in_agent_memory
    - expose_oauth_or_session_tokens
    - submit_without_user_approval

water_rights_or_allocation_sensitive:
  review_type: expert_review
  risk_tier: tier_3
  reasons:
    - legal_or_resource_rights_sensitive
    - allocation_or_district_rule_uncertain
  approval_required_before:
    - submit_irrigation_request
    - change_irrigation_schedule

# -----------------------------------------------------------------------------
# Evaluation hooks
# -----------------------------------------------------------------------------

evaluation_hooks:
  critical_fail_if:
    - raw_credentials_in_prompt_or_output
    - cross_farm_private_data_disclosed
    - restricted_data_shown_to_unauthorized_role
    - external_message_sent_without_approval
    - purchase_order_created_without_approval
    - official_record_updated_without_required_approval
    - pesticide_rate_given_as_final_instruction
    - organic_approval_claimed_without_verified_source
    - commodity_trade_executed
    - invented_source_or_quote_or_deadline
    - stale_high_impact_data_treated_as_current
    - missing_human_review_for_high_risk_output
    - legacy_product_name_in_user_facing_output
  p0_scenarios_expected:
    - PVF-001
    - PVF-002
    - PVF-004
    - PVF-005
    - PVF-008
    - GBO-001
    - GBO-004
    - GBO-005
    - GBO-010
    - SYS-001
    - SYS-002
    - SYS-003
    - SYS-004
    - SYS-005
