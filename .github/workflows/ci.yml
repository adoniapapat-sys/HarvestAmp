name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Validate fixtures
        run: python scripts/validate_fixtures.py

      - name: Run unit and regression tests
        run: python -m pytest tests/

      - name: Architecture check - CropHealth connector stays out of agents/workflows
        run: |
          if grep -R "CropHealthWatchlistConnector" harvestamp/agents harvestamp/workflows; then
            echo "CropHealthWatchlistConnector must not be imported or referenced directly from agents/workflows."
            exit 1
          fi
